name: single job docker deploy
on: push
jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: java-github-actions-demo

    steps:
      - uses: actions/checkout@v4
      - run: mvn package
      - run: docker build -t image1:v1 .
      - run: docker push image1:v1
